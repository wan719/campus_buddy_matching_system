spring:
  application:
    name: campus_buddy_matching_system

  datasource:
    url: jdbc:mysql://localhost:3306/campus_buddy_matching_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 20060719li
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  # SQL初始化配置
  sql:
    init:
      mode: always # 或 embedded
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false # 遇到错误是否继续
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.edu.swu.campus_buddy_matching_system.model.entity

jwt:
  secret: campus-buddy-matching-system-secret-key-2024-very-long-and-secure
  expiration: 86400000  # 24小时，单位毫秒

server:
  port: 8080

# 日志配置
logging:
  level:
    # MyBatis Mapper日志（显示SQL执行）
    "[cn.edu.swu.bookstore]": DEBUG
    # SQL日志
    "[org.springframework.jdbc]": DEBUG
    # Spring Security日志
    "[org.springframework.security]": DEBUG
  pattern:
    console: "%clr(%d{MM-dd HH:mm:ss}){faint} %clr(%-5level) : %msg%n"
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8